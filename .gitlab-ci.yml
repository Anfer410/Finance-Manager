stages:
  - version
  - build
  - release

default:
  interruptible: false
  tags: 
    - shell

version-bump:
  stage: version
  tags:
    - docker
  image: gitlab.iveydomek.xyz:5050/components/docker/python:latest
  variables:
    GIT_DEPTH: 0
    GL_TOKEN: $GITLAB_TOKEN
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore: release/'
      when: on_success
  script:
    - pip install "python-semantic-release>=9,<10"
    - export GL_TOKEN="$GITLAB_TOKEN"
    - git config user.email "gitlab-ci@$CI_SERVER_HOST"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git checkout "$CI_COMMIT_BRANCH"
    - git pull origin "$CI_COMMIT_BRANCH"
    - semantic-release version
    - semantic-release publish
    - echo "APP_VERSION=$(git describe --tags --abbrev=0)" >> version.env
  artifacts:
    reports:
      dotenv: version.env

include:
  - project: 'components/docker'
    ref: main
    file: template.gitlab-ci.yml
    inputs:
      image_name: finance-manager
      dockerfile: dockerfile
      ci_registry_image: "${CI_REGISTRY}/scripts/finances"
      rules_build:
        - if: '$CI_PIPELINE_SOURCE == "trigger"'
          when: never
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes:
            - app/**/*
          when: on_success
        - when: manual
          allow_failure: true
      rules_release:
        - if: '$CI_PIPELINE_SOURCE == "trigger"'
          when: never
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes:
            - app/**/*
          when: on_success
        - when: manual
          allow_failure: true

push-to-ghcr:
  stage: release
  needs:
    - job: "version-bump"
      artifacts: true
      optional: true
    - "build-finance-manager-image"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - app/**/*
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    GITLAB_IMAGE: "${CI_REGISTRY}/scripts/finances/finance-manager"
    GHCR_IMAGE: "ghcr.io/$GHCR_USER/finance-manager"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $GITLAB_IMAGE:$CI_COMMIT_SHA
    - docker login ghcr.io -u $GHCR_USER -p $GHCR_TOKEN
    - |
      if [ -n "$APP_VERSION" ]; then
        docker tag $GITLAB_IMAGE:$CI_COMMIT_SHA $GHCR_IMAGE:$APP_VERSION
        docker push $GHCR_IMAGE:$APP_VERSION
      fi
    - docker tag $GITLAB_IMAGE:$CI_COMMIT_SHA $GHCR_IMAGE:latest
    - docker push $GHCR_IMAGE:latest
